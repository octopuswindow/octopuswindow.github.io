<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <title>Title</title>
        <style>
        
            #hi {
                font-family: sans-serif;
                text-shadow: 3px 3px rgba(0, 0, 0, 0.15);
                color: indianred;
            }
            body {
                background-image: linear-gradient(to top, rgb(150, 148, 148), rgba(0, 0, 0, 0));
            }
            html, body {margin: 0; height: 100%; overflow: hidden}
        
        </style>
    </head>
    <body>
        <h1 id="hi">So basically how this works is you put ?id= in the url and then whatever newgrounds song id you want to be redirected to goes after that (kinda like this: octopuswindow.github.io/ng.html?id=1507887) </h1>
    
    <script>
        let j = window.location.toLocaleString();
        j = j.split('?')[1];
        let k = new URLSearchParams(j);
        for (let x of k.entries()) {
            if (x[0] == "id") {
                document.getElementById("hi").innerHTML="Redirecting to https://www.newgrounds.com/audio/listen/"+x[1];
                window.location.href = "https://www.newgrounds.com/audio/listen/"+x[1];
                break;

            }
        }
        
        
        </script>
    </body>
</html>
